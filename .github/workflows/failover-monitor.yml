name: 容灾监控
on:
  schedule:
    - cron: '*/5 * * * *'     # 每5分钟
  workflow_dispatch:            # 手动触发

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 读取容灾计数
        id: count_file
        run: |
          if [ -f .failover_count.json ]; then
            cat .failover_count.json
            FAILS=$(python3 -c "import json; print(json.load(open('.failover_count.json')).get('fails',0))")
            echo "consecutive_fails=$FAILS" >> $GITHUB_OUTPUT
          else
            echo "consecutive_fails=0" >> $GITHUB_OUTPUT
          fi

      - name: 检查主站健康
        id: check
        run: |
          # set +e 防止 curl SSL 错误触发 bash errexit
          set +e
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 https://www.chenxiuniverse.top 2>/dev/null)
          set -e
          STATUS=${STATUS:-000}
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "主站状态码: $STATUS"
          if [ "$STATUS" -ge 200 ] 2>/dev/null && [ "$STATUS" -lt 500 ] 2>/dev/null; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            NEW_FAILS=0
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            PREV=${{ steps.count_file.outputs.consecutive_fails }}
            NEW_FAILS=$((PREV + 1))
          fi
          echo "consecutive_fails=$NEW_FAILS" >> $GITHUB_OUTPUT
          echo "连续失败次数: $NEW_FAILS → 门槛: 3"
          # 持久化计数
          echo "{\"fails\":$NEW_FAILS,\"last_check\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > .failover_count.json

      - name: 判断是否触发容灾
        id: failover_decision
        run: |
          FAILS=${{ steps.check.outputs.consecutive_fails }}
          if [ "${{ steps.check.outputs.healthy }}" = "false" ] && [ "$FAILS" -ge 3 ]; then
            echo "trigger_backup=true" >> $GITHUB_OUTPUT
            echo "::warning::连续 $FAILS 次失败，触发容灾切换"
          else
            echo "trigger_backup=false" >> $GITHUB_OUTPUT
          fi
          if [ "${{ steps.check.outputs.healthy }}" = "true" ]; then
            echo "trigger_restore=true" >> $GITHUB_OUTPUT
          else
            echo "trigger_restore=false" >> $GITHUB_OUTPUT
          fi

      - name: 安装阿里云SDK
        run: pip install alibabacloud_alidns20150109

      - name: DNS切到备站
        id: backup
        if: steps.failover_decision.outputs.trigger_backup == 'true'
        run: |
          python3 scripts/failover-dns.py backup
          echo "switched=true" >> $GITHUB_OUTPUT
          # 切备站后重置计数，避免恢复后立刻又切
          echo '{"fails":0,"last_check":"reset-after-backup"}' > .failover_count.json
        env:
          ALI_KEY_ID: ${{ secrets.ALI_ACCESS_KEY_ID }}
          ALI_KEY_SECRET: ${{ secrets.ALI_ACCESS_KEY_SECRET }}

      - name: DNS恢复到主站
        id: restore
        if: steps.failover_decision.outputs.trigger_restore == 'true'
        run: |
          python3 scripts/failover-dns.py restore
          echo "switched=true" >> $GITHUB_OUTPUT
        env:
          ALI_KEY_ID: ${{ secrets.ALI_ACCESS_KEY_ID }}
          ALI_KEY_SECRET: ${{ secrets.ALI_ACCESS_KEY_SECRET }}

      - name: 记录监控事件
        if: always()
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" = "000" ]; then
            python3 scripts/monitor_logger.py failover-check --status fail --http-code "$STATUS"
          else
            python3 scripts/monitor_logger.py failover-check --status ok --http-code "$STATUS"
          fi
          if [ "${{ steps.backup.outputs.switched }}" = "true" ]; then
            python3 scripts/monitor_logger.py failover-action --action backup
          fi
          if [ "${{ steps.restore.outputs.switched }}" = "true" ]; then
            python3 scripts/monitor_logger.py failover-action --action restore
          fi

      - name: 提交日志和计数
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ .failover_count.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无日志变更"
          else
            git pull --rebase --autostash origin HEAD 2>/dev/null || true
            git commit -m "📝 容灾监控事件记录"
            git push
          fi
