name: 压力测试
on: workflow_dispatch

jobs:
  flood:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        node: [1, 2, 3]
    steps:
      - run: |
          for i in $(seq 1 200); do
            curl -s -o /dev/null -w "%{http_code}\n" --connect-timeout 3 --max-time 5 \
              "https://www.chenxiuniverse.top?t=$RANDOM" &
          done
          wait
          echo "Done"
