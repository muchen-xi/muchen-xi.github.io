name: CF优选IP智能优化
on:
  schedule:
    - cron: '37 */6 * * *'   # 每6小时，37分避开整点
  workflow_dispatch:          # 允许手动触发

permissions:
  contents: write

jobs:
  # ─── Job 1: 境外测速（US runner，CloudflareSpeedTest） ───
  overseas-scan:
    name: 境外测速 (CloudflareST)
    runs-on: ubuntu-latest
    outputs:
      ip_count: ${{ steps.scan.outputs.ip_count }}
    steps:
      - uses: actions/checkout@v4

      - name: 下载 CloudflareSpeedTest
        run: |
          curl -L -o cfst.tar.gz https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar xzf cfst.tar.gz
          chmod +x CloudflareST

      - name: 境外测速扫描
        id: scan
        run: |
          # 用 www 子域而非根域（根域是 JS 跳转，CloudflareST 测速不准）
          ./CloudflareST -n 200 -t 4 -tl 300 -sl 5 -o result.csv -url https://www.chenxiuniverse.top
          echo "=== 境外 Top 3 ==="
          head -4 result.csv
          IP_COUNT=$(tail -n +2 result.csv | wc -l)
          echo "ip_count=$IP_COUNT" >> $GITHUB_OUTPUT

      - name: 上传 result.csv
        uses: actions/upload-artifact@v4
        with:
          name: overseas-result
          path: result.csv
          retention-days: 1

  # ─── Job 2: 境内测速（ITDog Playwright，从中国节点测） ───
  china-scan:
    name: 境内测速 (ITDog)
    runs-on: ubuntu-latest
    needs: overseas-scan
    # 即使境外测速失败也继续（有 FALLBACK_IPS 兜底）
    if: always() && (needs.overseas-scan.result == 'success' || needs.overseas-scan.result == 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: 下载境外测速结果
        uses: actions/download-artifact@v4
        with:
          name: overseas-result
        continue-on-error: true

      - name: 安装 Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: 境内测速
        run: |
          python3 scripts/china_speed_test.py result.csv china_result.csv
          echo "=== 境内 Top 3 ==="
          head -4 china_result.csv

      - name: 上传 china_result.csv
        uses: actions/upload-artifact@v4
        with:
          name: china-result
          path: china_result.csv
          retention-days: 1

  # ─── Job 3: 更新 DNS（分线路: 境外→oversea, 境内→default） ───
  update-dns:
    name: 更新阿里云DNS
    runs-on: ubuntu-latest
    needs: [overseas-scan, china-scan]
    if: always() && (needs.overseas-scan.result == 'success' || needs.china-scan.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: 下载测速结果
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: 安装阿里云SDK
        run: pip install alibabacloud_alidns20150109

      - name: 健康验证
        id: health
        run: |
          if [ -f overseas-result/result.csv ]; then
            cp overseas-result/result.csv .
          fi
          if [ -f china-result/china_result.csv ]; then
            cp china-result/china_result.csv .
          fi
          set +e
          python3 scripts/health_check.py result.csv valid_overseas.csv
          OVERSEAS_OK=$?
          python3 scripts/health_check.py china_result.csv valid_china.csv
          CHINA_OK=$?
          set -e
          if [ $OVERSEAS_OK -ne 0 ] && [ $CHINA_OK -ne 0 ]; then
            echo "::error::境外+境内健康验证全部失败，阻断部署"
            exit 1
          fi
          if [ $OVERSEAS_OK -eq 0 ]; then echo "✅ 境外IP健康验证通过"; else echo "⚠️ 境外IP健康验证失败，跳过（境内可用）"; fi
          if [ $CHINA_OK -eq 0 ]; then echo "✅ 境内IP健康验证通过"; else echo "⚠️ 境内IP健康验证失败，跳过（境外可用）"; fi

      - name: 更新 DNS（分线路）
        run: |
          OVERSEAS_CSV="result.csv"
          CHINA_CSV="china_result.csv"
          if [ -f valid_overseas.csv ] && [ -s valid_overseas.csv ]; then
            OVERSEAS_CSV="valid_overseas.csv"
            echo "使用健康验证后的境外 IP"
          fi
          if [ -f valid_china.csv ] && [ -s valid_china.csv ]; then
            CHINA_CSV="valid_china.csv"
            echo "使用健康验证后的境内 IP"
          fi
          python3 scripts/update-dns.py "$OVERSEAS_CSV" "$CHINA_CSV"
        env:
          ALI_KEY_ID: ${{ secrets.ALI_ACCESS_KEY_ID }}
          ALI_KEY_SECRET: ${{ secrets.ALI_ACCESS_KEY_SECRET }}

      - name: 输出摘要 + 记录事件
        if: always()
        run: |
          echo "::notice::DNS 更新完成 @ $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          # 读取境外 IP
          OVERSEAS_IPS=""
          if [ -f result.csv ]; then
            OVERSEAS_IPS=$(python3 -c "
          import csv
          ips=[]
          with open('result.csv') as f:
              for r in csv.DictReader(f):
                  ip=r.get('IP地址') or r.get('IP 地址') or r.get('IP','')
                  if ip: ips.append(ip)
          print(','.join(ips[:3]))
          ")
          fi

          # 读取境内 IP
          CHINA_IPS=""
          if [ -f china_result.csv ]; then
            CHINA_IPS=$(python3 -c "
          import csv
          ips=[]
          with open('china_result.csv') as f:
              for r in csv.DictReader(f):
                  ip=r.get('IP地址') or r.get('IP 地址') or r.get('IP','')
                  if ip: ips.append(ip)
          print(','.join(ips[:3]))
          ")
          fi

          if [ -n "$OVERSEAS_IPS" ] || [ -n "$CHINA_IPS" ]; then
            python3 scripts/monitor_logger.py ip-update \
              --overseas "$OVERSEAS_IPS" \
              --china "$CHINA_IPS" \
              --changed
          fi

          # 提交日志
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无日志变更"
          else
            git pull --rebase --autostash origin HEAD 2>/dev/null || true
            git commit -m "📊 IP优选事件记录"
            git push
          fi
