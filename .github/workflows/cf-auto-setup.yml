name: cf-auto-setup
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CF automation
        run: python3 scripts/cf_setup.py
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
