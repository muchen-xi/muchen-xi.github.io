<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a30"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(200,220,255,0.8)"/>
      <stop offset="100%" stop-color="rgba(200,220,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <!-- Halo -->
  <circle cx="100" cy="28" r="18" fill="none" stroke="rgba(200,220,255,0.5)" stroke-width="2"/>
  <circle cx="100" cy="28" r="8" fill="url(#halo)"/>
  
  <!-- Face -->
  <ellipse cx="100" cy="80" rx="32" ry="30" fill="#f0e6d0"/>
  
  <!-- Eyes -->
  <ellipse cx="86" cy="78" rx="5" ry="6" fill="#335577"/>
  <ellipse cx="114" cy="78" rx="5" ry="6" fill="#335577"/>
  <circle cx="87" cy="76" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="115" cy="76" r="2" fill="#fff" opacity="0.8"/>
  
  <!-- Mouth (smile) -->
  <path d="M 92 90 Q 100 98 108 90" fill="none" stroke="#cc7766" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Hair (white/light blue) -->
  <path d="M 68 76 Q 60 55 72 48 Q 80 42 100 44 Q 120 42 128 48 Q 140 55 132 76" fill="#e8eeff" stroke="#ccd5ee" stroke-width="0.5"/>
  
  <!-- Body (blue outfit) -->
  <path d="M 72 106 Q 68 130 70 160 L 130 160 Q 132 130 128 106 Z" fill="#4477bb"/>
  
  <!-- Collar -->
  <path d="M 85 106 L 100 118 L 115 106" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Arms -->
  <path d="M 72 112 Q 56 130 58 142" fill="none" stroke="#f0e6d0" stroke-width="6" stroke-linecap="round"/>
  <path d="M 128 112 Q 144 130 142 142" fill="none" stroke="#f0e6d0" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Tablet -->
  <rect x="55" y="125" width="16" height="24" rx="2" fill="#224466" stroke="#88bbee" stroke-width="1"/>
  
  <!-- Label -->
  <text x="100" y="182" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-family="sans-serif">阿罗娜</text>
</svg>