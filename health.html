<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<title>健康检查 · 晨曦的宇宙</title>
<link rel="stylesheet" href="https://248200-xyz.pages.dev/theme/space.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,'Microsoft YaHei',sans-serif;background:#0a0a1a;color:#c8c8d4;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:48px 20px 32px}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:clamp(20px,4vw,32px);font-weight:700;background:linear-gradient(135deg,#6c8cff,#a06cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;margin-bottom:6px}
.header .sub{font-size:12px;color:#6a6a8a;letter-spacing:2px}
.banner{text-align:center;padding:14px 20px;border-radius:12px;font-size:15px;font-weight:600;letter-spacing:1px;margin-bottom:28px}
.banner-ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#22c55e}
.banner-bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.card{background:rgba(99,102,241,.04);border:1px solid rgba(99,102,241,.12);border-radius:12px;padding:18px 20px;transition:border-color .2s}
.card:hover{border-color:rgba(99,102,241,.3)}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(99,102,241,.08)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.5)}
.dot-bad{background:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.5)}
.dot-check{background:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,.5);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card-title{font-size:14px;font-weight:600;color:#e2e2e8;line-height:1.3}
.card-body{display:flex;flex-direction:column;gap:8px}
.card-row{display:flex;justify-content:space-between;align-items:center}
.card-label{font-size:11px;color:#6a6a8a;letter-spacing:.5px}
.card-value{font-size:13px;font-weight:500;color:#c8c8d4}
.card-time{font-size:11px;color:#9090a8;font-family:'Courier New',monospace}
.info-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;padding:16px 20px;background:rgba(99,102,241,.04);border:1px solid rgba(99,102,241,.08);border-radius:12px;margin-bottom:16px;font-size:12px;color:#9090a8}
.info-bar strong{color:#6366f1;font-weight:600}
.refresh-hint{text-align:center;font-size:11px;color:#4a4a6a;letter-spacing:1px;margin-top:8px}
.footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid rgba(99,102,241,.08);font-size:11px;color:#4a4a6a;letter-spacing:1px;line-height:1.8}
.footer strong{color:#6366f1;font-weight:600}
@media(max-width:480px){.container{padding:32px 14px 24px}.cards{grid-template-columns:1fr}.info-bar{flex-direction:column;align-items:center;gap:8px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>晨曦的宇宙 · 健康检查</h1>
  <p class="sub">实时监控所有站点状态</p>
</div>

<div id="banner"></div>
<div id="cards" class="cards"></div>

<div class="info-bar">
  <span>检查方式 <strong>客户端直连</strong></span>
  <span>自动刷新 <strong>30s</strong></span>
  <span id="check-time">检查中...</span>
</div>
<div class="refresh-hint">每30秒自动刷新</div>
<div class="footer">
  Powered by <strong>Cloudflare Pages</strong> · 晨曦的宇宙<br>
  &copy; 2026 chenxiuniverse.top
</div>
</div>

<script>
const TARGETS = [
  { name: '晨曦的宇宙主站', url: 'https://www.chenxiuniverse.top' },
  { name: 'PiManager 下载站', url: 'https://pimanager.chenxiuniverse.top' },
  { name: 'CF Pages 源站', url: 'https://248200-xyz.pages.dev' },
];

function esc(s) {
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function checkTarget(target) {
  const start = performance.now();
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(target.url, { method: 'HEAD', signal: ctrl.signal, cache: 'no-cache' });
    clearTimeout(t);
    return { name: target.name, ok: res.ok, status: res.status, latency: Math.round(performance.now() - start), error: null };
  } catch (e) {
    return { name: target.name, ok: false, status: 0, latency: Math.round(performance.now() - start), error: e.name === 'AbortError' ? '超时' : e.message };
  }
}

function render(results) {
  const allOk = results.every(r => r.ok);
  const banner = document.getElementById('banner');
  banner.innerHTML = allOk
    ? '<div class="banner banner-ok">✅ 所有系统运行正常</div>'
    : '<div class="banner banner-bad">⚠️ 部分服务异常</div>';

  const cards = document.getElementById('cards');
  cards.innerHTML = results.map(r => {
    const color = r.ok ? '#22c55e' : '#ef4444';
    const dotClass = r.ok ? 'dot-ok' : 'dot-bad';
    const statusText = r.ok ? '在线' : (r.error || 'HTTP '+r.status);
    return `<div class="card">
      <div class="card-header">
        <span class="dot ${dotClass}"></span>
        <span class="card-title">${esc(r.name)}</span>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="card-label">状态</span>
          <span class="card-value" style="color:${color};font-weight:600">${statusText}</span>
        </div>
        <div class="card-row">
          <span class="card-label">延迟</span>
          <span class="card-value">${r.latency} ms</span>
        </div>
        <div class="card-row">
          <span class="card-label">检查时间</span>
          <span class="card-value card-time">${new Date().toLocaleTimeString('zh-CN',{hour12:false})}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('check-time').innerHTML = '检查完成 <strong>' + new Date().toLocaleTimeString('zh-CN',{hour12:false}) + '</strong>';
}

// 初始加载动画
document.getElementById('banner').innerHTML = '<div class="banner" style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#f59e0b">🔍 正在检查所有站点...</div>';
document.getElementById('cards').innerHTML = TARGETS.map(t => `
  <div class="card">
    <div class="card-header">
      <span class="dot dot-check"></span>
      <span class="card-title">${esc(t.name)}</span>
    </div>
    <div class="card-body">
      <div class="card-row"><span class="card-label">状态</span><span class="card-value">检查中...</span></div>
    </div>
  </div>
`).join('');

// 执行检查
(async () => {
  const results = await Promise.all(TARGETS.map(checkTarget));
  render(results);
})();
</script>
<script>(function(){var u='https://www.chenxiuniverse.top/ping?site=health';navigator.sendBeacon?navigator.sendBeacon(u):(new Image()).src=u;})()</script>
</body>
</html>
