<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a30"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <!-- Witch hat -->
  <path d="M 100 30 L 80 58 L 68 56 L 72 62 L 58 60 L 62 66 Q 80 70 100 68 Q 120 70 138 66 L 142 60 L 128 62 L 132 56 L 120 58 Z" fill="#553366"/>
  <ellipse cx="100" cy="56" rx="40" ry="8" fill="#442255"/>
  <!-- Hat band -->
  <rect x="78" y="52" width="44" height="4" rx="2" fill="#7744aa"/>
  
  <!-- Face -->
  <ellipse cx="100" cy="82" rx="30" ry="28" fill="#f0e6d0"/>
  
  <!-- Eyes (deep blue/purple) -->
  <ellipse cx="87" cy="80" rx="4.5" ry="5.5" fill="#334477"/>
  <ellipse cx="113" cy="80" rx="4.5" ry="5.5" fill="#334477"/>
  <circle cx="88" cy="78" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="114" cy="78" r="1.5" fill="#fff" opacity="0.8"/>
  
  <!-- Gentle smile -->
  <path d="M 93 92 Q 100 98 107 92" fill="none" stroke="#bb8877" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Hair (dark purple) -->
  <path d="M 70 76 Q 62 54 72 48 Q 80 44 100 46 Q 120 44 128 48 Q 138 54 130 76" fill="#3a2255" stroke="#4a3366" stroke-width="0.5"/>
  
  <!-- Body (witch robe, dark purple) -->
  <path d="M 74 108 Q 70 134 72 162 L 128 162 Q 130 134 126 108 Z" fill="#2a1a3e"/>
  
  <!-- Cape -->
  <path d="M 68 108 Q 50 130 55 155 L 65 150 Q 62 135 72 120 Z" fill="#3a2a4e" opacity="0.7"/>
  <path d="M 132 108 Q 150 130 145 155 L 135 150 Q 138 135 128 120 Z" fill="#3a2a4e" opacity="0.7"/>
  
  <!-- Collar/necklace -->
  <circle cx="100" cy="104" r="3" fill="#8866aa"/>
  <path d="M 90 102 Q 100 110 110 102" fill="none" stroke="#8866aa" stroke-width="1" opacity="0.6"/>
  
  <!-- Book in hands -->
  <rect x="78" y="118" width="44" height="30" rx="2" fill="#553366" stroke="#7744aa" stroke-width="1"/>
  <line x1="100" y1="118" x2="100" y2="148" stroke="#7744aa" stroke-width="1" opacity="0.5"/>
  
  <!-- Arms holding book -->
  <path d="M 78 125 Q 68 118 74 110" fill="none" stroke="#f0e6d0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 122 125 Q 132 118 126 110" fill="none" stroke="#f0e6d0" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Magic sparkles -->
  <circle cx="36" cy="50" r="1.5" fill="#aa88dd" opacity="0.5"/>
  <circle cx="164" cy="60" r="1" fill="#aa88dd" opacity="0.4"/>
  <circle cx="40" cy="80" r="1" fill="#cc99ee" opacity="0.3"/>
  <circle cx="162" cy="90" r="1.5" fill="#cc99ee" opacity="0.4"/>
  
  <!-- Label -->
  <text x="100" y="182" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-family="sans-serif">莫妮卡</text>
</svg>