<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a30"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <!-- Face -->
  <ellipse cx="100" cy="80" rx="30" ry="28" fill="#f0e6d0"/>
  
  <!-- Eyes (deadpan) -->
  <ellipse cx="87" cy="78" rx="4.5" ry="5" fill="#223344"/>
  <ellipse cx="113" cy="78" rx="4.5" ry="5" fill="#223344"/>
  <circle cx="88" cy="76" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="114" cy="76" r="1.5" fill="#fff" opacity="0.7"/>
  
  <!-- Mouth (flat line) -->
  <line x1="94" y1="90" x2="106" y2="90" stroke="#bb8877" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Hair (blue-black) -->
  <path d="M 70 74 Q 60 50 72 44 Q 80 40 100 42 Q 120 40 128 44 Q 140 50 130 74" fill="#223355" stroke="#334466" stroke-width="0.5"/>
  
  <!-- Side hair -->
  <path d="M 70 74 Q 64 100 68 120" fill="none" stroke="#223355" stroke-width="6" stroke-linecap="round"/>
  <path d="M 130 74 Q 136 100 132 120" fill="none" stroke="#223355" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Choker -->
  <rect x="83" y="100" width="34" height="4" rx="2" fill="#445566"/>
  
  <!-- Body (sailor uniform) -->
  <path d="M 74 106 Q 70 132 72 160 L 128 160 Q 130 132 126 106 Z" fill="#2a2a3e"/>
  
  <!-- Collar -->
  <path d="M 82 104 L 100 116 L 118 104" fill="none" stroke="#667788" stroke-width="1.5"/>
  <path d="M 100 104 L 100 116" stroke="#667788" stroke-width="1"/>
  
  <!-- Tie -->
  <path d="M 97 104 L 100 122 L 103 104" fill="#995566"/>
  
  <!-- Arms crossed -->
  <path d="M 74 112 Q 80 120 90 118" fill="none" stroke="#f0e6d0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 126 112 Q 120 120 110 118" fill="none" stroke="#f0e6d0" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Bass guitar hint -->
  <path d="M 60 130 Q 55 145 62 155" fill="none" stroke="#887744" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="56" cy="145" rx="5" ry="8" fill="#998855" opacity="0.6"/>
  
  <!-- Label -->
  <text x="100" y="182" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-family="sans-serif">山田凉</text>
</svg>